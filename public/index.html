<!DOCTYPE html>
<html>
<head>

<title>AI SEO Auditor</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<h1>AI SEO Auditor</h1>

<input id="urlInput" placeholder="Enter website">

<button onclick="analyze()">Analyze</button>

<div id="result" class="hidden">

<h2>SEO Score</h2>

<canvas id="scoreChart"></canvas>

<h2>SEO Feature Dashboard</h2>

<div id="featureGrid" class="feature-grid"></div>

<h2>Top Keywords</h2>

<ul id="keywords"></ul>

<h2>Suggestions</h2>

<ul id="suggestions"></ul>

<button id="downloadPDF">Download PDF Report</button>

<h2>Comparison Dashboard</h2>

<table border="1">

<thead>

<tr>
<th>Site</th>
<th>Score</th>
<th>H1</th>
<th>Images</th>
<th>Words</th>
<th>Grade</th>
</tr>

</thead>

<tbody id="comparisonTable"></tbody>

</table>

</div>

<script src="script.js"></script>

</body>
</html>
