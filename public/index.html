<!DOCTYPE html>
<html>
<head>

<title>AI SEO Auditor</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<h1>AI SEO Auditor</h1>

<input id="urlInput" placeholder="Enter website">

<button onclick="analyze()">Analyze</button>

<h2>SEO Score Graph</h2>

<canvas id="scoreChart"></canvas>

<h2>SEO Checks (42 Features)</h2>

<div id="featureGrid" class="feature-grid"></div>

<h2>SEO Suggestions</h2>

<ul id="suggestions"></ul>

<h2>Website Comparison</h2>

<table border="1">

<thead>
<tr>
<th>Website</th>
<th>Score</th>
<th>Words</th>
<th>Images</th>
<th>Links</th>
<th>H1</th>
</tr>
</thead>

<tbody id="comparisonTable"></tbody>

</table>

<script src="script.js"></script>

</body>
</html>
